<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stream Playground</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    #canvas-container {
      position: fixed;
      inset: 0;
    }

    #canvas-container canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    /* Side panel */
    #ui-panel {
      position: fixed;
      top: 0;
      right: 0;
      width: 320px;
      height: 100vh;
      background: rgba(10, 10, 10, 0.85);
      backdrop-filter: blur(12px);
      border-left: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      flex-direction: column;
      z-index: 100;
      transition: transform 0.3s ease;
    }

    #ui-panel.collapsed {
      transform: translateX(300px);
    }

    #panel-toggle {
      position: fixed;
      top: 50%;
      right: 320px;
      transform: translateY(-50%);
      background: rgba(10, 10, 10, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-right: none;
      color: #e0e0e0;
      cursor: pointer;
      padding: 8px 6px;
      font-size: 12px;
      z-index: 101;
      border-radius: 4px 0 0 4px;
      backdrop-filter: blur(12px);
      transition: right 0.3s ease;
    }

    #panel-toggle.collapsed {
      right: 20px;
    }

    #panel-header {
      padding: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    #panel-header h1 {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #fff;
    }

    #panel-header p {
      font-size: 11px;
      color: #666;
      margin-top: 4px;
    }

    /* Model switcher */
    #model-switcher {
      padding: 16px 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    #model-switcher label {
      font-size: 11px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    #model-switcher .model-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }

    #model-name {
      flex: 1;
      font-size: 13px;
      color: #e0e0e0;
    }

    .btn-icon {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: #e0e0e0;
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 14px;
      transition: background 0.15s;
    }

    .btn-icon:hover { background: rgba(255,255,255,0.12); }

    /* Shader controls */
    #shader-controls {
      padding: 16px 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    #shader-controls label {
      font-size: 11px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      display: block;
      margin-bottom: 10px;
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .slider-row span {
      font-size: 11px;
      color: #888;
      width: 80px;
      flex-shrink: 0;
    }

    .slider-row input[type="range"] {
      flex: 1;
      accent-color: #6366f1;
    }

    .slider-row .val {
      font-size: 11px;
      color: #aaa;
      width: 32px;
      text-align: right;
    }

    /* Stream list */
    #stream-list-section {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
    }

    #stream-list-section h2 {
      font-size: 11px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }

    #stream-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .stream-item {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px;
      padding: 10px 12px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      position: relative;
    }

    .stream-item:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.15);
    }

    .stream-item.active {
      background: rgba(99,102,241,0.15);
      border-color: rgba(99,102,241,0.4);
    }

    .stream-item-name {
      font-size: 13px;
      font-weight: 500;
      color: #e0e0e0;
    }

    .stream-item-url {
      font-size: 10px;
      color: #555;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .stream-item-status {
      position: absolute;
      top: 10px;
      right: 10px;
    }

    /* Status badge */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 10px;
      font-weight: 500;
    }

    .status-badge.live {
      background: rgba(34,197,94,0.15);
      color: #22c55e;
      border: 1px solid rgba(34,197,94,0.3);
    }

    .status-badge.live::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 1.5s infinite;
    }

    .status-badge.offline {
      background: rgba(239,68,68,0.1);
      color: #ef4444;
      border: 1px solid rgba(239,68,68,0.2);
    }

    .status-badge.checking {
      background: rgba(234,179,8,0.1);
      color: #eab308;
      border: 1px solid rgba(234,179,8,0.2);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }


    /* Loading overlay */
    #loading-overlay {
      position: fixed;
      inset: 0;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
      transition: opacity 0.5s ease;
    }

    #loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-spinner {
      width: 36px;
      height: 36px;
      border: 2px solid rgba(255,255,255,0.1);
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .loading-text {
      margin-top: 16px;
      font-size: 12px;
      color: #555;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
  </style>
</head>
<body>

  <div id="loading-overlay">
    <div class="loading-spinner"></div>
    <p class="loading-text">Loading scene</p>
  </div>

  <div id="canvas-container"></div>

  <button id="panel-toggle" title="Toggle panel">◀</button>

  <div id="ui-panel">
    <div id="panel-header">
      <h1>Stream Playground</h1>
      <p>Auto-discovers Cloudflare live inputs</p>
    </div>

    <div id="model-switcher">
      <label>3D Model</label>
      <div class="model-controls">
        <button class="btn-icon" id="model-prev">‹</button>
        <span id="model-name">Box</span>
        <button class="btn-icon" id="model-next">›</button>
      </div>
    </div>

    <div id="shader-controls">
      <label>Shader Controls</label>
      <div class="slider-row">
        <span>Tile Scale</span>
        <input type="range" id="tile-scale" min="0.1" max="5" step="0.05" value="1.0" />
        <span class="val" id="tile-scale-val">1.0</span>
      </div>
      <div class="slider-row">
        <span>Blend Sharp</span>
        <input type="range" id="blend-sharp" min="1" max="20" step="0.5" value="4" />
        <span class="val" id="blend-sharp-val">4.0</span>
      </div>
    </div>

    <div id="stream-list-section">
      <h2>Active Streams</h2>
      <div id="stream-list">
        <p style="color:#444; font-size:12px;">Loading streams…</p>
      </div>
    </div>

  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
